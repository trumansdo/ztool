[package]
name = "ztool"
version = "0.1.0"
edition = "2021"

[dependencies]
reqwest = { version = "0.12", features = ["json", "native-tls"] }
tokio = { version = "1.42.0", features = ["full"] }
# serde deps
serde = { version = "1.0.216", features = ["derive"] }
serde_json = { version = "1.0.134" }
serde_yml = "0.0.11"
#rbatis deps
rbs = { version = "4.5.24" }
rbatis = { version = "4.5.48" }
rbdc-sqlite = { version = "4.5.7" }
# log deps
log = "0.4.22"
log4rs = {version="1.3.0"}

clap = {version="4.5.23",features=["derive","env","debug"]}